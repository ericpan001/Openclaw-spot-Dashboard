<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 即時交易看盤</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #050816;
            --panel: rgba(9, 16, 34, 0.72);
            --border: rgba(118, 167, 255, 0.18);
            --text: #f4fbff;
            --text-soft: rgba(224, 236, 255, 0.7);
            --text-mute: rgba(160, 181, 214, 0.56);
            --positive: #00f7b2;
            --negative: #ff5f7c;
            --neutral: #6cb7ff;
            --cyan: #33d7ff;
            --radius-lg: 24px;
            --radius-md: 18px;
        }
        body {
            background: linear-gradient(135deg, #030611 0%, #071121 48%, #030814 100%);
            color: var(--text);
            font-family: 'Sora', sans-serif;
            overflow: auto;
            padding: 12px;
        }
        .app-shell { display: grid; grid-template-rows: auto auto 1fr; gap: 10px; }
        .shell-card {
            background: linear-gradient(180deg, rgba(13, 23, 46, 0.88), rgba(7, 14, 28, 0.78));
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(18px);
            padding: 20px;
        }
        .topbar { display: flex; justify-content: space-between; align-items: center; }
        .brand-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--cyan); }
        .live-chip { color: var(--positive); font-weight: 700; }

        .overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 10px; }
        .metric-card { padding: 15px; border-radius: var(--radius-md); border: 1px solid var(--border); background: rgba(8, 16, 31, 0.5); }
        .metric-label { font-size: 0.7rem; color: var(--text-mute); text-transform: uppercase; letter-spacing: 1px; }
        .metric-value { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; margin-top: 5px; }
        .positive { color: var(--positive); }
        .negative { color: var(--negative); }
        .neutral { color: var(--neutral); }

        .main-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 10px; margin-top: 10px; }
        .panel { min-height: 300px; padding: 15px; }
        .panel-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th { text-align: left; color: var(--text-mute); padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .thinking-list { height: 400px; overflow-y: auto; font-size: 0.85rem; }
        .thinking-item { margin-bottom: 10px; padding: 10px; border-left: 3px solid var(--cyan); background: rgba(255,255,255,0.03); border-radius: 4px; }
        .thinking-time { color: var(--text-mute); font-size: 0.7rem; }

        .chart-container { height: 250px; position: relative; }
        .token-pill { display: inline-block; padding: 4px 10px; background: rgba(0,247,178,0.1); border: 1px solid var(--positive); border-radius: 99px; font-size: 0.7rem; margin-right: 5px; color: var(--positive); }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="shell-card topbar">
            <div>
                <h1 class="brand-title">小龍蝦 24H 即時看盤</h1>
                <p style="font-size:0.8rem; color:var(--text-soft)">100% 直連幣安 API，每 5 秒強同步</p>
            </div>
            <div class="live-chip">● LIVE <span id="liveClock">--:--:--</span></div>
        </header>

        <section class="overview-grid">
            <div class="metric-card">
                <div class="metric-label">即時總淨值 (Equity)</div>
                <div class="metric-value positive" id="currentBalance">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">可用 USDT</div>
                <div class="metric-value neutral" id="remainingUsdt">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">持倉市值</div>
                <div class="metric-value neutral" id="investedValue">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">未實現損益</div>
                <div class="metric-value" id="positionPnl">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">24H 交易數</div>
                <div class="metric-value neutral" id="totalTrades">--</div>
            </div>
        </section>

        <main class="main-layout">
            <div class="left-col">
                <section class="shell-card panel">
                    <div class="panel-title">持倉與資產同步 (每 5s 輪播)</div>
                    <div id="holdingBox">
                        <h2 id="currentCoin">--</h2>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                            <div>
                                <div class="metric-label">買入成本</div>
                                <div id="avgPrice" class="metric-value">--</div>
                            </div>
                            <div>
                                <div class="metric-label">即時市價</div>
                                <div id="livePrice" class="metric-value positive">--</div>
                            </div>
                        </div>
                        <div style="margin-top:15px;">
                            <div class="metric-label">持有數量</div>
                            <div id="coinQty" style="font-size:1.2rem">--</div>
                        </div>
                    </div>
                </section>

                <section class="shell-card panel" style="margin-top:10px;">
                    <div class="panel-title">最近交易紀錄</div>
                    <table id="tradeTable">
                        <thead><tr><th>時間</th><th>方向</th><th>價格</th><th>盈虧</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </section>
            </div>

            <div class="right-col">
                <section class="shell-card panel">
                    <div class="panel-title">AI 思考流</div>
                    <div class="thinking-list" id="thinkingList"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        function updateClock() {
            document.getElementById('liveClock').textContent = new Date().toLocaleTimeString('zh-TW', { hour12: false });
        }

        async function loadData() {
            try {
                const bust = Date.now();
                // 1. 同步抓取基礎資料
                const [thoughts, trades, holdingsMeta, assetsMeta, ordersMeta] = await Promise.all([
                    fetch(`thinking.json?t=${bust}`).then(r => r.json()),
                    fetch(`trades.json?t=${bust}`).then(r => r.json()),
                    fetch(`dashboard_holdings.json?t=${bust}`).then(r => r.json()).catch(() => ({holdings:[]})),
                    fetch(`dashboard_assets.json?t=${bust}`).then(r => r.json()).catch(() => ({})),
                    fetch(`dashboard_orders.json?t=${bust}`).then(r => r.json()).catch(() => ({orderCount:0}))
                ]);

                // 2. 直連幣安抓取全市場即時市價
                const priceRes = await fetch('https://api.binance.com/api/v3/ticker/price');
                const prices = await priceRes.json();
                const priceMap = {};
                prices.forEach(p => priceMap[p.symbol] = Number(p.price));

                // 3. 計算 100% 即時數據
                const holdings = holdingsMeta.holdings || [];
                let totalHoldingsValue = 0;
                let totalUnrealizedPnl = 0;

                holdings.forEach(h => {
                    const currentPrice = priceMap[h.symbol] || 0;
                    const value = currentPrice * Number(h.quantity);
                    const pnl = (currentPrice - Number(h.avgBuyPrice)) * Number(h.quantity);
                    totalHoldingsValue += value;
                    totalUnrealizedPnl += pnl;
                    h.currentPrice = currentPrice; // 注入 100% 即時價
                });

                const remainingUsdt = Number(assetsMeta.remainingUsdt || 0);
                const totalEquity = remainingUsdt + totalHoldingsValue;

                // 4. 更新 UI - 強制即時反應
                document.getElementById('currentBalance').textContent = totalEquity.toFixed(2) + ' USDT';
                document.getElementById('remainingUsdt').textContent = remainingUsdt.toFixed(2) + ' USDT';
                document.getElementById('investedValue').textContent = totalHoldingsValue.toFixed(2) + ' USDT'; // 持倉市值即時化
                
                const pnlEl = document.getElementById('positionPnl');
                pnlEl.textContent = (totalUnrealizedPnl >= 0 ? '+' : '') + totalUnrealizedPnl.toFixed(2) + ' USDT';
                pnlEl.className = 'metric-value ' + (totalUnrealizedPnl >= 0 ? 'positive' : 'negative');
                
                document.getElementById('totalTrades').textContent = String(ordersMeta.orderCount).padStart(2, '0');

                // 5. 輪播處理 (持倉優先，沒持倉顯示監控幣)
                if (holdings.length > 0) {
                    const slot = Math.floor(Date.now() / 5000) % holdings.length;
                    const h = holdings[slot];
                    document.getElementById('currentCoin').textContent = h.asset + ' (持倉中 ' + (slot+1) + '/' + holdings.length + ')';
                    document.getElementById('avgPrice').textContent = h.avgBuyPrice.toFixed(2);
                    document.getElementById('livePrice').textContent = h.currentPrice.toFixed(2);
                    document.getElementById('coinQty').textContent = Number(h.quantity).toFixed(6) + ' ' + h.asset;
                } else {
                    document.getElementById('currentCoin').textContent = "目前無持倉";
                    document.getElementById('avgPrice').textContent = "--";
                    document.getElementById('livePrice').textContent = "--";
                    document.getElementById('coinQty').textContent = "等待訊號中...";
                }

                // 6. 更新表格與思考流
                const tradeBody = document.querySelector('#tradeTable tbody');
                tradeBody.innerHTML = trades.slice(-5).reverse().map(t => `
                    <tr>
                        <td>${t.time.substring(11)}</td>
                        <td class="${t.type==='BUY'?'positive':'negative'}">${t.type==='BUY'?'買入':'賣出'} ${t.symbol.replace('USDT','')}</td>
                        <td>${Number(t.price).toFixed(2)}</td>
                        <td class="${t.pnl>=0?'positive':'negative'}">${t.pnl?t.pnl.toFixed(2):'--'}</td>
                    </tr>
                `).join('');

                const thinkEl = document.getElementById('thinkingList');
                const visibleThoughts = thoughts.filter(t => !t.thought.includes('掃描')).slice(-15).reverse();
                thinkEl.innerHTML = visibleThoughts.map(t => `
                    <div class="thinking-item">
                        <div class="thinking-time">${t.time}</div>
                        <div>${t.thought}</div>
                    </div>
                `).join('');

            } catch (e) {
                console.error("即時更新失敗:", e);
            }
        }

        setInterval(updateClock, 1000);
        setInterval(loadData, 5000); // 5 秒強同步一次
        loadData();
    </script>
</body>
</html>
