<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小龍蝦 3.0.2 極速移動止盈看盤</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #030611;
            --panel: rgba(13, 23, 46, 0.85);
            --border: rgba(118, 167, 255, 0.25);
            --text: #f4fbff;
            --positive: #00f7b2;
            --negative: #ff5f7c;
            --cyan: #33d7ff;
            --warning: #ffcc00;
            --radius-lg: 24px;
        }
        body {
            background: radial-gradient(circle at top right, #0a1835, var(--bg));
            color: var(--text);
            font-family: 'Sora', sans-serif;
            padding: 15px;
            overflow-x: hidden;
        }
        .shell-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(20px);
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .brand { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); }
        .status-badge { font-size: 0.75rem; padding: 5px 12px; border-radius: 99px; background: rgba(0,247,178,0.1); border: 1px solid var(--positive); color: var(--positive); }
        
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .m-card { padding: 18px; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .m-label { font-size: 0.7rem; color: rgba(160, 181, 214, 0.7); text-transform: uppercase; letter-spacing: 1px; }
        .m-value { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; margin-top: 5px; }
        
        .main-layout { display: grid; grid-template-columns: 1.4fr 1fr; gap: 15px; }
        .full-width-section { margin-bottom: 15px; }
        .pos-panel { min-height: 400px; position: relative; }
        .trailing-box { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; border-left: 4px solid var(--warning); }
        .chart-card { margin-bottom: 15px; }
        .chart-wrap { position: relative; height: 300px; margin-top: 10px; }
        .chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: rgba(255,255,255,0.75); }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .chart-note { font-size: 0.72rem; color: rgba(160, 181, 214, 0.72); margin-top: 8px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th { text-align: left; color: rgba(160, 181, 214, 0.6); padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .think-list { height: 450px; overflow-y: auto; scrollbar-width: thin; }
        .think-item { padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.03); margin-bottom: 8px; border-left: 3px solid var(--cyan); }
        
        .positive { color: var(--positive); }
        .negative { color: var(--negative); }
        .warning { color: var(--warning); }
        
        /* WebSocket Pulse Effect */
        .pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="topbar shell-card">
        <div class="brand">🦞 小龍蝦 3.0.2 PRO</div>
        <div style="display:flex; gap:10px; align-items:center;">
            <div class="status-badge pulse">● TELEGRAM BOT ACTIVE</div>
            <div id="wsStatus" class="status-badge" style="border-color:var(--cyan); color:var(--cyan);">WebSocket Syncing...</div>
        </div>
    </div>

    <section class="hero-grid">
        <div class="m-card">
            <div class="m-label">即時總淨值 (Equity)</div>
            <div class="m-value positive" id="totalEquity">--</div>
        </div>
        <div class="m-card">
            <div class="m-label">可用 USDT 餘額</div>
            <div class="m-value" id="availUsdt">--</div>
        </div>
        <div class="m-card">
            <div class="m-label">持倉總市值</div>
            <div class="m-value" id="investedValue" style="color:var(--cyan)">--</div>
        </div>
        <div class="m-card">
            <div class="m-label">未實現總盈虧</div>
            <div class="m-value" id="totalPnl">--</div>
        </div>
    </section>

    <section class="shell-card chart-card full-width-section">
        <h3 style="font-family:'Orbitron'; margin-bottom:10px; font-size:0.9rem;">📈 目前持幣 7D 即時曲線</h3>
        <div class="chart-note">只顯示目前持有的幣種，會跟著最新價格即時更新。</div>
        <div class="chart-wrap">
            <canvas id="portfolioChart"></canvas>
        </div>
        <div class="chart-legend" id="chartLegend"></div>
    </section>

    <main class="main-layout">
        <div class="left-col">
            <section class="shell-card pos-panel">
                <h3 style="font-family:'Orbitron'; margin-bottom:15px; font-size:0.9rem;">🎯 持倉追蹤與移動止盈 (Trailing Stop)</h3>
                <div id="holdingArea">
                    <div style="text-align:center; padding:50px; color:rgba(255,255,255,0.2);">正在等待 WebSocket 數據...</div>
                </div>
                
                <h3 style="font-family:'Orbitron'; margin-top:30px; margin-bottom:10px; font-size:0.9rem;">📜 最近成交明細</h3>
                <table id="tradeList">
                    <thead><tr><th>時間</th><th>資產</th><th>方向</th><th>價格</th><th>盈虧</th></tr></thead>
                    <tbody></tbody>
                </table>
            </section>
        </div>

        <div class="right-col">
            <section class="shell-card">
                <h3 style="font-family:'Orbitron'; margin-bottom:15px; font-size:0.9rem;">🧠 AI 思考流 (Telegram 同步)</h3>
                <div class="think-list" id="thinkArea"></div>
            </section>
        </div>
    </main>

    <script>
        let ws;
        let prices = {};
        let holdings = [];
        let assets = {};
        let portfolioChart = null;
        let chartSeries = {};
        let chartLabels = [];
        const chartColors = ['#33d7ff', '#00f7b2', '#ffcc00', '#ff5f7c', '#9b7bff'];
        // [優化 3.0] 使用本地對象來永久鎖定本次 Session 的最高獲利點
        let localMaxCache = {}; 

        // 1. WebSocket 毫秒級價格接收
        function initWebSocket() {
            ws = new WebSocket('wss://stream.binance.com:9443/ws/!miniTicker@arr');
            ws.onopen = () => document.getElementById('wsStatus').textContent = '⚡ WS REALTIME';
            ws.onmessage = (evt) => {
                const data = JSON.parse(evt.data);
                data.forEach(ticker => {
                    prices[ticker.s] = parseFloat(ticker.c);
                });
                renderUI();
            };
        }

        async function fetchBaseData() {
            const bust = Date.now();
            const [hRes, aRes, tRes, thRes, apRes] = await Promise.all([
                fetch(`dashboard_holdings.json?t=${bust}`).then(r => r.json()),
                fetch(`dashboard_assets.json?t=${bust}`).then(r => r.json()),
                fetch(`trades.json?t=${bust}`).then(r => r.json()),
                fetch(`thinking.json?t=${bust}`).then(r => r.json()),
                fetch(`dashboard_active_positions.json?t=${bust}`).then(r => r.json()).catch(() => ({}))
            ]);
            const oldSymbols = (holdings || []).map(h => h.symbol).sort().join(',');
            holdings = hRes.holdings || [];
            assets = aRes;
            activePositions = apRes;
            updateTables(tRes, thRes);
            const newSymbols = holdings.map(h => h.symbol).sort().join(',');
            if (oldSymbols !== newSymbols || !chartLabels.length) {
                await refreshPortfolioChart();
            } else {
                updateLiveChartPrices();
            }
        }

        async function loadKlines(symbol) {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=4h&limit=42`);
            const data = await res.json();
            return (data || []).map(k => ({
                time: new Date(k[0]).toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' }),
                close: parseFloat(k[4])
            }));
        }

        function renderChartLegend() {
            const legend = document.getElementById('chartLegend');
            if (!legend) return;
            legend.innerHTML = holdings.map((h, idx) => {
                const currentPrice = prices[h.symbol] || chartSeries[h.symbol]?.at(-1) || h.avgBuyPrice;
                const basePrice = chartSeries[h.symbol]?.[0] || currentPrice || 1;
                const perf = ((currentPrice - basePrice) / basePrice) * 100;
                const color = chartColors[idx % chartColors.length];
                return `
                    <div class="legend-item">
                        <span class="legend-dot" style="background:${color}"></span>
                        <span>${h.asset} ${currentPrice.toFixed(2)} <span class="${perf >= 0 ? 'positive' : 'negative'}">${perf >= 0 ? '+' : ''}${perf.toFixed(2)}%</span></span>
                    </div>
                `;
            }).join('') || '<div class="chart-note">目前無持倉，暫無曲線。</div>';
        }

        async function refreshPortfolioChart() {
            const activeHoldings = holdings.filter(h => h.quantity > 0);
            const canvas = document.getElementById('portfolioChart');
            if (!canvas) return;
            if (!activeHoldings.length) {
                if (portfolioChart) {
                    portfolioChart.destroy();
                    portfolioChart = null;
                }
                chartSeries = {};
                chartLabels = [];
                renderChartLegend();
                return;
            }

            const seriesList = await Promise.all(activeHoldings.map(h => loadKlines(h.symbol).catch(() => [])));
            chartSeries = {};
            chartLabels = seriesList[0]?.map(p => p.time) || [];

            const datasets = activeHoldings.map((h, idx) => {
                const points = seriesList[idx] || [];
                chartSeries[h.symbol] = points.map(p => p.close);
                const basePrice = chartSeries[h.symbol][0] || 1;
                const normalized = chartSeries[h.symbol].map(v => ((v - basePrice) / basePrice) * 100);
                const color = chartColors[idx % chartColors.length];
                return {
                    label: h.asset,
                    data: normalized,
                    borderColor: color,
                    backgroundColor: color + '22',
                    borderWidth: 2,
                    tension: 0.25,
                    pointRadius: 0,
                    pointHoverRadius: 3
                };
            });

            if (portfolioChart) portfolioChart.destroy();
            portfolioChart = new Chart(canvas, {
                type: 'line',
                data: { labels: chartLabels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y >= 0 ? '+' : ''}${ctx.parsed.y.toFixed(2)}%`
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'rgba(255,255,255,0.55)', maxTicksLimit: 7 },
                            grid: { color: 'rgba(255,255,255,0.04)' }
                        },
                        y: {
                            ticks: {
                                color: 'rgba(255,255,255,0.55)',
                                callback: (value) => `${value}%`
                            },
                            grid: { color: 'rgba(255,255,255,0.06)' }
                        }
                    }
                }
            });
            renderChartLegend();
        }

        function updateLiveChartPrices() {
            if (!portfolioChart) {
                renderChartLegend();
                return;
            }
            let changed = false;
            portfolioChart.data.datasets.forEach(ds => {
                const symbol = `${ds.label}USDT`;
                if (!chartSeries[symbol]?.length || !prices[symbol]) return;
                const rawData = [...chartSeries[symbol]];
                rawData[rawData.length - 1] = prices[symbol];
                const basePrice = rawData[0] || 1;
                ds.data = rawData.map(v => ((v - basePrice) / basePrice) * 100);
                changed = true;
            });
            if (changed) portfolioChart.update('none');
            renderChartLegend();
        }

        function renderUI() {
            let totalInvested = 0;
            let totalUnrealizedPnl = 0;
            
            // 清理已平倉的本地高點紀錄
            const activeSymbols = holdings.map(h => h.symbol);
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('max_')) {
                    const sym = key.replace('max_', '');
                    if (!activeSymbols.includes(sym)) {
                        localStorage.removeItem(key);
                    }
                }
            }
            
            const holdingHtml = holdings.map(h => {
                const currentPrice = prices[h.symbol] || h.avgBuyPrice;
                const value = currentPrice * h.quantity;
                const pnl = (currentPrice - h.avgBuyPrice) * h.quantity;
                const pnlPct = ((currentPrice - h.avgBuyPrice) / h.avgBuyPrice) * 100;
                
                totalInvested += value;
                totalUnrealizedPnl += pnl;

                // 使用後端提供的 max_pnl 或本地計算的較高者
                let backendMaxPnl = 0;
                if (activePositions[h.symbol] && activePositions[h.symbol].max_pnl) {
                    backendMaxPnl = activePositions[h.symbol].max_pnl * 100;
                }
                
                // [優化 3.0.1 PRO] 真·前端本地高點鎖定 - 使用 LocalStorage 永久鎖定
                let savedLocalMax = parseFloat(localStorage.getItem(`max_${h.symbol}`) || "0");
                let savedEntry = localStorage.getItem(`entry_${h.symbol}`) || "0";
                
                // 如果後台回傳的買入成本變了，代表是新的一單，立刻清空舊紀錄
                const backendEntry = (activePositions[h.symbol] && activePositions[h.symbol].entry) || h.avgBuyPrice;
                if (Math.abs(parseFloat(savedEntry) - backendEntry) > 0.0001) {
                    savedLocalMax = 0;
                    localStorage.setItem(`max_${h.symbol}`, "0");
                    localStorage.setItem(`entry_${h.symbol}`, backendEntry.toString());
                }

                // 取 目前損益、後台紀錄、本地紀錄 三者之中的「絕對最高點」
                const realMaxPnl = Math.max(pnlPct, (activePositions[h.symbol]?.max_pnl || 0) * 100, savedLocalMax);
                
                // 只要一創新高，就立刻寫入 LocalStorage 永久鎖定
                if (realMaxPnl > savedLocalMax) {
                    localStorage.setItem(`max_${h.symbol}`, realMaxPnl.toString());
                }
                
                // 計算回落距離 (天花板 - 目前)
                const pullback = realMaxPnl > pnlPct ? (realMaxPnl - pnlPct).toFixed(2) : "0.00";

                return `
                <div class="m-card" style="margin-bottom:10px; background:rgba(255,255,255,0.05);">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h2 style="font-family:'Orbitron'; color:var(--cyan);">${h.asset}</h2>
                        <div class="status-badge" style="border-color:var(--warning); color:var(--warning);">移動止盈監控中</div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px; margin-top:15px;">
                        <div><div class="m-label">持倉數量</div><div style="font-size:1rem;">${h.quantity.toFixed(4)}</div></div>
                        <div><div class="m-label">買入成本</div><div style="font-size:1rem;">${h.avgBuyPrice.toFixed(2)}</div></div>
                        <div><div class="m-label">即時價格</div><div style="font-size:1rem;" class="positive">${currentPrice.toFixed(2)}</div></div>
                    </div>
                    <div class="trailing-box">
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                            <span>目前損益: <b class="${pnlPct>=0?'positive':'negative'}">${pnlPct.toFixed(2)}%</b></span>
                            <span>最高獲利點: <b>${realMaxPnl.toFixed(2)}%</b></span>
                            <span class="warning">回落距離: <b>${pullback}%</b></span>
                        </div>
                        <div style="height:4px; background:#333; margin-top:10px; border-radius:2px;">
                            <div style="width:${Math.min(pnlPct*10, 100)}%; height:100%; background:var(--positive); border-radius:2px;"></div>
                        </div>
                        <p style="font-size:0.65rem; color:rgba(255,255,255,0.3); margin-top:8px;">※ 獲利達 4% 啟動追蹤，回落 1% 自動平倉</p>
                    </div>
                </div>
                `;
            }).join('');

            document.getElementById('holdingArea').innerHTML = holdingHtml || '<div style="text-align:center; padding:50px; color:rgba(255,255,255,0.2);">目前無持倉，等待訊號中...</div>';
            
            const remainingUsdt = parseFloat(assets.remainingUsdt || 0);
            document.getElementById('availUsdt').textContent = remainingUsdt.toFixed(2) + ' USDT';
            document.getElementById('investedValue').textContent = totalInvested.toFixed(2) + ' USDT';
            document.getElementById('totalEquity').textContent = (remainingUsdt + totalInvested).toFixed(2) + ' USDT';
            
            const pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = (totalUnrealizedPnl >= 0 ? '+' : '') + totalUnrealizedPnl.toFixed(2) + ' USDT';
            pnlEl.className = 'm-value ' + (totalUnrealizedPnl >= 0 ? 'positive' : 'negative');
            updateLiveChartPrices();
        }

        function formatTradeTime(rawTime) {
            if (!rawTime) return '--';
            if (typeof rawTime !== 'string') return String(rawTime);
            // 已經是 HH:MM 或 HH:MM:SS 就直接顯示
            if (/^\d{2}:\d{2}(:\d{2})?$/.test(rawTime)) return rawTime;
            // 若是 ISO / 完整日期字串，取最後的時間部分
            const match = rawTime.match(/(\d{2}:\d{2}:\d{2})/);
            if (match) return match[1];
            return rawTime;
        }

        function tradeSortValue(t) {
            if (t.tradeId !== undefined && t.tradeId !== null) return Number(t.tradeId) || 0;
            const raw = String(t.time || '');
            const m = raw.match(/(\d{2}):(\d{2}):(\d{2})/);
            if (!m) return 0;
            return Number(m[1]) * 3600 + Number(m[2]) * 60 + Number(m[3]);
        }

        function updateTables(trades, thoughts) {
            const tBody = document.querySelector('#tradeList tbody');
            const sortedTrades = [...trades]
                .sort((a, b) => tradeSortValue(b) - tradeSortValue(a))
                .filter((t, i, arr) => i === arr.findIndex(x => {
                    const aId = x.orderId ?? x.tradeId ?? `${x.time}-${x.symbol}-${x.type}`;
                    const bId = t.orderId ?? t.tradeId ?? `${t.time}-${t.symbol}-${t.type}`;
                    return aId === bId && x.symbol === t.symbol && x.type === t.type;
                }));
            tBody.innerHTML = sortedTrades.slice(0, 5).map(t => {
                const isBuy = (t.type==='BUY'||t.type==='買入');
                const tag = t.isManualSync || t.syncSource === 'binance-myTrades'
                    ? '<span class="trade-tag manual">手動同步</span>'
                    : '<span class="trade-tag bot">策略</span>';
                return `
                <tr>
                    <td>${formatTradeTime(t.time)}</td>
                    <td style="font-weight:bold; color:var(--cyan);">${t.symbol.replace('USDT','')}${tag}</td>
                    <td class="${isBuy?'positive':'negative'}">${isBuy?'買入':'賣出'}</td>
                    <td>${Number(t.price).toFixed(2)}</td>
                    <td class="${Number(t.pnl)>=0?'positive':'negative'}">${Number(t.pnl).toFixed(2)}</td>
                </tr>
            `}).join('');

            const thinkArea = document.getElementById('thinkArea');
            thinkArea.innerHTML = thoughts.slice(-15).reverse().map(th => `
                <div class="think-item">
                    <div style="font-size:0.7rem; color:rgba(255,255,255,0.3);">${th.time}</div>
                    <div style="margin-top:5px; font-size:0.85rem;">${th.thought}</div>
                </div>
            `).join('');
        }

        initWebSocket();
        setInterval(fetchBaseData, 3000);
        fetchBaseData();
    </script>
</body>
</html>
